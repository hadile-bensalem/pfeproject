services:

  # ── Base de données PostgreSQL ─────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: dindor-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-dindorpfe}
      POSTGRES_USER:     ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dindor2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-dindorpfe}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dindor-net

  # ── Backend Spring Boot ────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dindor-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST:         db
      DB_PORT:         5432
      DB_NAME:         ${DB_NAME:-dindorpfe}
      DB_USERNAME:     ${DB_USERNAME:-postgres}
      DB_PASSWORD:     ${DB_PASSWORD:-dindor2024}
      AI_PREDICTION_URL: http://ai:8001
      CORS_ALLOWED_ORIGINS: http://localhost,http://frontend
      DINDOR_JWT_SECRET: ${JWT_SECRET:-NDY4RTU3NjVKNDlPNDJBNkZIN040M0EyRjZBNkZIN0EyRjZBMkZIN0EyRjY=}
      DINDOR_ADMIN_EMAIL:    ${ADMIN_EMAIL:-dindorvolaille@gmail.com}
      DINDOR_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-dindor2022@Mm}
      DINDOR_MAIL_PASSWORD:  ${DINDOR_MAIL_PASSWORD:-xxslkittznihoajh}
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    networks:
      - dindor-net

  # ── Module IA FastAPI ─────────────────────────────────────
  ai:
    build:
      context: dindor-ai
      dockerfile: Dockerfile
    container_name: dindor-ai
    restart: unless-stopped
    volumes:
      - ./dindor-ai/data:/app/data:ro
    networks:
      - dindor-net

  # ── Frontend Angular + Nginx ──────────────────────────────
  frontend:
    build:
      context: dindorfront
      dockerfile: Dockerfile
    container_name: dindor-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - ai
    networks:
      - dindor-net

volumes:
  postgres_data:
  uploads_data:
  logs_data:

networks:
  dindor-net:
    driver: bridge
