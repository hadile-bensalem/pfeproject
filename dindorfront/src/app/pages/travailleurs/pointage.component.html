<div class="pointage-container">
  <header class="page-header">
    <div>
      <h2>Pointage journalier</h2>
      <p class="subtitle">Saisie et historique des présences</p>
    </div>
  </header>

  <section class="form-section" [formGroup]="form">
    <div class="form-grid">
      <div class="form-group">
        <label>Date</label>
        <input type="date" formControlName="datePointage">
        <p class="error" *ngIf="form.get('datePointage')?.hasError('required')">
          Date obligatoire
        </p>
        <p class="error" *ngIf="form.get('datePointage')?.hasError('sundayForbidden')">
          Le dimanche est un jour de repos
        </p>
      </div>

      <div class="form-group">
        <label>Heures travaillées</label>
        <input type="number" formControlName="heuresTravaillees">
      </div>

      <div class="form-group">
        <label>Rendement du jour (0.5 - 2.0)</label>
        <input type="number" formControlName="rendementJour" step="0.1">
      </div>

      <div class="form-group full-width">
        <label>Observations</label>
        <textarea rows="2" formControlName="observations"></textarea>
      </div>
    </div>

    <div class="actions">
      <button type="button" (click)="onSubmit()">Enregistrer le pointage</button>
    </div>
  </section>

  <section class="table-section">
    <h3>Historique des pointages</h3>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Heures</th>
          <th>Rendement</th>
          <th>Observations</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of historique">
          <td>{{ row.datePointage }}</td>
          <td>{{ row.heuresTravaillees }}</td>
          <td>{{ row.rendementJour }}</td>
          <td>{{ row.observations }}</td>
        </tr>
      </tbody>
    </table>
  </section>
</div>
