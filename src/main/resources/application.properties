spring.application.name=dindor

# ─────────────────────────────────────────────
# SERVER
# ─────────────────────────────────────────────
server.port=8099
# context-path supprimé — préfixe /api ajouté via WebConfig pour les RestControllers uniquement

# Compression GZIP — réduit la bande passante de 60-70%
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# ─────────────────────────────────────────────
# DATABASE — utiliser variables d'environnement en production
# Production : export DB_HOST=prod-server DB_PASSWORD=<secret>
# ─────────────────────────────────────────────
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dindorpfe}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}

# Connection pool HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ─────────────────────────────────────────────
# JPA / HIBERNATE
# ATTENTION : utiliser 'validate' + Flyway/Liquibase en production
# ─────────────────────────────────────────────
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ─────────────────────────────────────────────
# ADMIN INITIALIZATION
# ─────────────────────────────────────────────
app.admin.email=${DINDOR_ADMIN_EMAIL:dindorvolaille@gmail.com}
app.admin.password=${DINDOR_ADMIN_PASSWORD:dindor2022@Mm}
app.admin.firstName=${DINDOR_ADMIN_FIRSTNAME:Marouane}
app.admin.lastName=${DINDOR_ADMIN_LASTNAME:Slama}

# ─────────────────────────────────────────────
# JWT — générer un secret robuste : openssl rand -base64 64
# ─────────────────────────────────────────────
app.jwt.secret=${DINDOR_JWT_SECRET:NDY4RTU3NjVKNDlPNDJBNkZIN040M0EyRjZBNkZIN0EyRjZBMkZIN0EyRjY=}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ─────────────────────────────────────────────
# EMAIL
# ─────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${DINDOR_MAIL_USERNAME:dindorvolaille@gmail.com}
spring.mail.password=${DINDOR_MAIL_PASSWORD:xxslkittznihoajh}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.mail.from=${DINDOR_MAIL_USERNAME:dindorvolaille@gmail.com}
app.mail.from-name=Dind'or Administration
app.password-reset.token-expiration=3600000
app.password-reset.max-attempts=3

# ─────────────────────────────────────────────
# COMPANY
# ─────────────────────────────────────────────
app.company.matricule-fiscal=${DINDOR_MATRICULE_FISCAL:1790869BM}
app.company.code-tva=${DINDOR_CODE_TVA:A}
app.company.code-categorie=${DINDOR_CODE_CATEGORIE:0}
app.company.numero-etablissement=${DINDOR_NUMERO_ETAB:000}
app.company.denomination=${DINDOR_DENOMINATION:STE DINDOR}
app.company.adresse=${DINDOR_ADRESSE:RUE IBN CHAREF}
app.company.ville=${DINDOR_VILLE:KSIB}

# ─────────────────────────────────────────────
# JACKSON
# ─────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ─────────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────────
app.security.max-login-attempts=5
app.security.lockout-duration=900000
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ─────────────────────────────────────────────
# EXTERNAL SERVICES
# ─────────────────────────────────────────────
ai.prediction.url=${AI_PREDICTION_URL:http://localhost:8001}

# ─────────────────────────────────────────────
# FILE UPLOAD
# ─────────────────────────────────────────────
app.uploads.dir=${DINDOR_UPLOADS_DIR:uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ─────────────────────────────────────────────
# ACTUATOR — monitoring et healthcheck
# ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# ─────────────────────────────────────────────
# LOGGING — rotation automatique des fichiers
# ─────────────────────────────────────────────
logging.level.com.poly.dindor=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.file.name=logs/dindor-application.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=300MB
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n
