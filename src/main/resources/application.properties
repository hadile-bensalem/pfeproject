
spring.application.name=dindor

# Server Configuration
server.port=8099
server.servlet.context-path=/api

### DATABASE ###
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/dindorpfe?createDatabaseIfNotExist=true
spring.datasource.username=${DINDOR_DB_USERNAME:root}
spring.datasource.password=${DINDOR_DB_PASSWORD:}
# JPA (Java Persistence API) and Hibernate configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Admin Initialization
app.admin.email=${DINDOR_ADMIN_EMAIL:dindorvolaille@gmail.com}
app.admin.password=${DINDOR_ADMIN_PASSWORD:dindor2022@Mm}
app.admin.firstName=${DINDOR_ADMIN_FIRSTNAME:Marouane}
app.admin.lastName=${DINDOR_ADMIN_LASTNAME:Slama}

# JWT Configuration
# Secret must be at least 32 bytes (256 bits) — generate with: openssl rand -base64 48
app.jwt.secret=${DINDOR_JWT_SECRET:NDY4RTU3NjVKNDlPNDJBNkZIN040M0EyRjZBNkZIN0EyRjZBMkZIN0EyRjY=}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Email Configuration (Dind'Or Official Email)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${DINDOR_MAIL_USERNAME:dindorvolaille@gmail.com}
spring.mail.password=${DINDOR_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Application mail metadata used by EmailService / PasswordResetService
app.mail.from=${DINDOR_MAIL_USERNAME:dindorvolaille@gmail.com}
app.mail.from-name=Dind'or Administration

# Password Reset Token Configuration
app.password-reset.token-expiration=3600000
app.password-reset.max-attempts=3

# Company Properties — Section A of the Retenue à la Source certificate
app.company.matricule-fiscal=${DINDOR_MATRICULE_FISCAL:1790869BM}
app.company.code-tva=${DINDOR_CODE_TVA:A}
app.company.code-categorie=${DINDOR_CODE_CATEGORIE:0}
app.company.numero-etablissement=${DINDOR_NUMERO_ETAB:000}
app.company.denomination=${DINDOR_DENOMINATION:STE DINDOR}
app.company.adresse=${DINDOR_ADRESSE:RUE IBN CHAREF}
app.company.ville=${DINDOR_VILLE:KSIB}

# Jackson — dates ISO-8601 (pas de timestamps numériques)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# Security Configuration
app.security.max-login-attempts=5
app.security.lockout-duration=900000
app.security.cors.allowed-origins=http://localhost:4200

# Logging Configuration
logging.level.com.poly.dindor=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.file.name=logs/dindor-application.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
