# ============================================================
# Profil PRODUCTION — surcharge application.properties
# Activer avec : --spring.profiles.active=prod
# ============================================================

# Désactiver les logs SQL (performance + confidentialité)
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Réduire le bruit Spring Security en production
logging.level.org.springframework.security=WARN

# Niveau applicatif minimal en production
logging.level.com.poly.dindor=INFO

# Ne jamais recréer le schéma en production
spring.jpa.hibernate.ddl-auto=update

# Port Azure App Service (PORT fourni par la plateforme, 8080 par défaut)
server.port=${PORT:8080}

# URL de reset password (remplacer par le vrai domaine frontend après déploiement)
app.password-reset.reset-url=${FRONTEND_URL:https://dindor-frontend.azurestaticapps.net}/auth/reset-password
